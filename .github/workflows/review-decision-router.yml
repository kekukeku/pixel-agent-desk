name: Review Decision Router

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
    branches: [master, main]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  route-review-decision:
    if: >
      github.event.action != 'labeled' ||
      github.event.label.name == 'needs-grok-review'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Resolve task
        id: task
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: node agent-runner/resolve-task.js --require --github-output

      - name: Route review decision
        id: route
        env:
          HANDOFF_ROUTER_ENDPOINT: ${{ secrets.HANDOFF_ROUTER_ENDPOINT }}
          HANDOFF_ROUTER_TOKEN: ${{ secrets.HANDOFF_ROUTER_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: node agent-runner/route-review-decision.js "${{ steps.task.outputs.task_num }}" --github-output

      - name: Apply decision labels and comment
        if: steps.route.outputs.decision != 'NONE'
        uses: actions/github-script@v7
        env:
          DECISION: ${{ steps.route.outputs.decision }}
          LABELS_TO_ADD: ${{ steps.route.outputs.labels_to_add }}
          LABELS_TO_REMOVE: ${{ steps.route.outputs.labels_to_remove }}
          COMMENT_BODY: ${{ steps.route.outputs.comment }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const labelsToAdd = process.env.LABELS_TO_ADD.split(',').filter(Boolean);
            const labelsToRemove = process.env.LABELS_TO_REMOVE.split(',').filter(Boolean);
            const labelColors = {
              'approved-by-grok': '0E8A16',
              'changes-requested-by-grok': 'D93F0B',
              'rejected-by-grok': 'B60205',
              'needs-grok-review': '5319E7',
              'needs-antigravity-work': 'FBCA04',
              'operator-review-required': 'C2E0C6'
            };

            for (const name of labelsToAdd) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) {
                  core.warning(`Could not inspect label ${name}: ${error.message}`);
                  continue;
                }

                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name,
                    color: labelColors[name] || 'BFDADC',
                    description: `Managed by Review Decision Router for ${process.env.DECISION}`
                  });
                } catch (createError) {
                  core.warning(`Could not create label ${name}: ${createError.message}`);
                }
              }
            }

            if (labelsToAdd.length > 0) {
              try {
                await github.rest.issues.addLabels({ owner, repo, issue_number, labels: labelsToAdd });
              } catch (error) {
                core.warning(`Could not add labels: ${error.message}`);
              }
            }

            for (const name of labelsToRemove) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
              } catch (error) {
                if (error.status !== 404) {
                  core.warning(`Could not remove label ${name}: ${error.message}`);
                }
              }
            }

            try {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: process.env.COMMENT_BODY
              });
            } catch (error) {
              core.warning(`Could not create router comment: ${error.message}`);
            }

      - name: Upload handoff payload
        if: steps.route.outputs.decision != 'NONE'
        uses: actions/upload-artifact@v4
        with:
          name: handoff-route-${{ steps.task.outputs.task_id }}
          path: REVIEWS/handoff_payload_${{ steps.task.outputs.task_num }}.json
